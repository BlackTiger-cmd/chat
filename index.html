<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

:root{
  --maroon:#800000;
  --gold:#d4af37;
  --bg:#f6f6f6;
  --white:#ffffff;
  --text:#111;
  --soft:#eaeaea;
}

/* PAGE */
body{
  margin:0;
  font-family: Arial;
  height:100vh;
  display:flex;
  flex-direction:column;
  background:var(--bg);
}

/* HEADER */
.header{
  height:55px;
  background:var(--maroon);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 12px;
  color:white;
  border-bottom:2px solid var(--gold);
}

.title{
  color:var(--gold);
  font-weight:bold;
}

/* CHAT AREA */
.chat{
  flex:1;
  overflow-y:auto;
  padding:12px;
  display:flex;
  flex-direction:column;
}

/* MESSAGE */
.msg{
  max-width:75%;
  margin:6px 0;
  padding:10px 12px;
  border-radius:14px;
  font-size:14px;
  line-height:1.4;
  animation:pop .15s ease;
  position:relative;
  word-wrap:break-word;
}

/* YOU */
.me{
  margin-left:auto;
  background:var(--gold);
  color:#000;
  border-bottom-right-radius:5px;
}

/* CLIENT */
.other{
  background:var(--white);
  border:1px solid #eee;
  border-bottom-left-radius:5px;
}

/* TIME */
.time{
  display:block;
  font-size:10px;
  margin-top:4px;
  opacity:0.6;
}

/* INPUT */
.inputBar{
  display:flex;
  align-items:center;
  padding:8px;
  background:var(--white);
  border-top:1px solid #ddd;
}

/* INPUT FIELD */
input{
  flex:1;
  border:1px solid #ddd;
  padding:10px;
  border-radius:20px;
  outline:none;
}

/* BUTTONS */
.iconBtn{
  width:40px;
  height:40px;
  border-radius:50%;
  border:none;
  margin-left:6px;
  background:var(--maroon);
  color:white;
}

.sendBtn{
  margin-left:6px;
  border:none;
  padding:10px 14px;
  border-radius:20px;
  background:var(--gold);
  color:#000;
  font-weight:bold;
}

/* EMOJI PANEL */
.emojiBox{
  display:none;
  position:absolute;
  bottom:70px;
  left:10px;
  right:10px;
  background:white;
  border-radius:14px;
  padding:10px;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
  max-height:220px;
  overflow-y:auto;
}

.emojiBox span{
  font-size:22px;
  margin:6px;
  display:inline-block;
}

/* TYPING */
.typing{
  font-size:12px;
  padding:6px 10px;
  color:var(--maroon);
  display:none;
}

/* ANIMATION */
@keyframes pop{
  from{opacity:0; transform:translateY(8px);}
  to{opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<div class="header">
  <div class="title" id="chatTitle">Chat</div>
  <div>🟢 Online</div>
</div>

<div class="chat" id="chat"></div>

<div class="typing" id="typing">جاري الكتابة...</div>

<div class="emojiBox" id="emojiBox">
  <span onclick="addEmoji('😂')">😂</span>
  <span onclick="addEmoji('😅')">😅</span>
  <span onclick="addEmoji('🤣')">🤣</span>
  <span onclick="addEmoji('😭')">😭</span>
  <span onclick="addEmoji('😍')">😍</span>
  <span onclick="addEmoji('😊')">😊</span>
  <span onclick="addEmoji('👍')">👍</span>
  <span onclick="addEmoji('🔥')">🔥</span>
  <span onclick="addEmoji('❤️')">❤️</span>
  <span onclick="addEmoji('💯')">💯</span>
  <span onclick="addEmoji('👏')">👏</span>
  <span onclick="addEmoji('🤔')">🤔</span>
</div>

<div class="inputBar">

  <button class="iconBtn" onclick="toggleEmoji()">😊</button>
  <button class="iconBtn" onclick="toggleTyping()">⌨️</button>
  <button class="iconBtn">🎤</button>

  <input id="msg" placeholder="اكتب رسالتك...">

  <button class="sendBtn" onclick="send()">إرسال</button>

</div>

<script>

let input=document.getElementById("msg");
let emojiBox=document.getElementById("emojiBox");
let typing=document.getElementById("typing");

/* SEND */
function send(){
  if(input.value.trim()=="") return;
  addMessage(input.value,"me");
  input.value="";
}

/* ADD MESSAGE */
function addMessage(text,type){

  let div=document.createElement("div");
  div.className="msg "+type;

  let time=new Date().toLocaleTimeString();

  div.innerHTML=`
    ${text}
    <span class="time">${time}</span>
  `;

  document.getElementById("chat").appendChild(div);
  div.scrollIntoView({behavior:"smooth"});
}

/* EMOJI */
function toggleEmoji(){
  emojiBox.style.display =
    emojiBox.style.display==="block" ? "none":"block";
}

function addEmoji(e){
  input.value += e;
}

/* TYPING */
function toggleTyping(){
  typing.style.display =
    typing.style.display==="block" ? "none":"block";
}

/* NIOTRON */
function addMessageExternal(text,type){
  addMessage(text,type);
}

/* TITLE */
function setChatTitle(text){
  document.getElementById("chatTitle").innerText=text;
}

</script>

</body>
</html>
