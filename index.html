<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

/* ================= CORE THEME ================= */
:root{
  --maroon:#800000;
  --gold:#d4af37;
  --dark:#1c1c1c;
  --white:#ffffff;
}

body{
  margin:0;
  font-family:Arial;
  height:100vh;
  display:flex;
  flex-direction:column;
  background:var(--dark);
  background-size:cover;
}

/* ================= HEADER ================= */
.header{
  height:55px;
  background:var(--maroon);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 10px;
  border-bottom:2px solid var(--gold);
  color:var(--gold);
}

.statusDot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:lime;
}

/* ================= CHAT ================= */
.chat{
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

.msg{
  max-width:75%;
  padding:10px;
  margin:6px 0;
  border-radius:12px;
  font-size:14px;
  word-break:break-word;
}

.me{
  align-self:flex-end;
  background:var(--gold);
  color:black;
}

.other{
  align-self:flex-start;
  background:white;
}

.meta{
  font-size:10px;
  opacity:0.6;
  margin-top:4px;
}

/* ================= INPUT ================= */
.inputBar{
  display:flex;
  padding:6px;
  background:#111;
  align-items:center;
}

input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:20px;
  outline:none;
}

button{
  margin-left:5px;
  padding:10px 12px;
  border:none;
  border-radius:20px;
  background:var(--maroon);
  color:white;
}

/* ================= EMOJI BOX ================= */
#emojiBox{
  display:none;
  position:absolute;
  bottom:70px;
  left:10px;
  right:10px;
  background:white;
  border-radius:12px;
  padding:10px;
  max-height:220px;
  overflow:auto;
  z-index:999;
  font-size:22px;
}

/* ================= SETTINGS ================= */
#settings{
  display:none;
  position:fixed;
  top:60px;
  left:10px;
  background:white;
  padding:10px;
  border-radius:10px;
  z-index:9999;
}

</style>
</head>

<body>

<div class="header">
  <div id="title">AKLAT PRO CHAT</div>
  <div class="statusDot"></div>
</div>

<div class="chat" id="chat"></div>

<div id="typing" style="display:none;color:gold;padding:5px;">جاري الكتابة...</div>

<div class="inputBar">
<button onclick="toggleEmoji()">😊</button>
<button onclick="toggleSettings()">⚙️</button>
<button onclick="pickImage()">📷</button>
<button onclick="pickFile()">📎</button>

<input id="msg" placeholder="اكتب...">
<button onclick="send()">إرسال</button>

<input type="file" id="img" hidden>
<input type="file" id="file" hidden>
</div>

<div id="emojiBox">
😂 😅 🤣 😍 😊 😭 😎 👍 👌 🙏 💯 🔥 ❤️ 🚀 ⚡ 🎉 🎮 📱 🧠 💰 🏆 ✨ 😡 😱 😴 🤔 😇 😘 😜 😋 😤 😈 👻 💩 🥳 💥 🌟 🎯 🥇 🥈 🥉
</div>

<div id="settings">
<b>Background</b><br>
<button onclick="setBg('https://images.unsplash.com/photo-1507525428034-b723cf961d3e')">Sea</button>
<button onclick="setBg('https://images.unsplash.com/photo-1519681393784-d120267933ba')">Night</button>
<button onclick="setBg('')">Clear</button>
<br><br>
<b>Theme</b><br>
<button onclick="theme('maroon')">Maroon</button>
<button onclick="theme('dark')">Dark</button>
<button onclick="theme('gold')">Gold</button>
</div>

<script>
firebase.initializeApp({
  apiKey:"YOUR_KEY",
  authDomain:"YOUR_DOMAIN",
  databaseURL:"YOUR_DB"
});

const roomId="room1";
const chatRef=firebase.database().ref("chat/"+roomId);
const typingRef=firebase.database().ref("typing/"+roomId);

const uid = localStorage.getItem("uid") || crypto.randomUUID();
localStorage.setItem("uid", uid);

function send(){
  let input=document.getElementById("msg");
  if(!input.value.trim()) return;

  chatRef.push({
    text:input.value,
    type:"text",
    sender:uid,
    time:new Date().toLocaleTimeString()
  });

  input.value="";
}

chatRef.on("child_added",s=>{
  let m=s.val();
  let div=document.createElement("div");

  div.className="msg "+(m.sender===uid?"me":"other");

  if(m.type==="image"){
    div.innerHTML=`<img src="${m.text}" style="width:100%;border-radius:10px;">
    <div class="meta">${m.time}</div>`;
  }
  else if(m.type==="file"){
    div.innerHTML=`📎 <a href="${m.text}" target="_blank">${m.name}</a>
    <div class="meta">${m.time}</div>`;
  }
  else{
    div.innerHTML=`${m.text}<div class="meta">${m.time}</div>`;
  }

  document.getElementById("chat").appendChild(div);
  div.scrollIntoView({behavior:"smooth"});
});

document.getElementById("msg").addEventListener("input",()=>{
  typingRef.set({user:uid,typing:true});
  clearTimeout(window.t);
  window.t=setTimeout(()=>{
    typingRef.set({user:uid,typing:false});
  },800);
});

typingRef.on("value",s=>{
  let v=s.val();
  document.getElementById("typing").style.display = v?.typing ? "block":"none";
});

function toggleEmoji(){
  let e=document.getElementById("emojiBox");
  e.style.display = e.style.display==="block"?"none":"block";
}

document.getElementById("emojiBox").onclick=e=>{
  if(e.target.innerText){
    document.getElementById("msg").value+=e.target.innerText;
  }
};

function toggleSettings(){
  let s=document.getElementById("settings");
  s.style.display=s.style.display==="block"?"none":"block";
}

function setBg(url){
  document.body.style.backgroundImage = url ? `url(${url})` : "none";
}

function theme(t){
  if(t==="maroon"){
    document.documentElement.style.setProperty('--maroon','#800000');
    document.documentElement.style.setProperty('--gold','#d4af37');
  }
  if(t==="dark"){
    document.documentElement.style.setProperty('--maroon','#222');
    document.documentElement.style.setProperty('--gold','#999');
  }
  if(t==="gold"){
    document.documentElement.style.setProperty('--maroon','#3b2f00');
    document.documentElement.style.setProperty('--gold','#ffd700');
  }
}

function pickImage(){ document.getElementById("img").click(); }

document.getElementById("img").onchange=async e=>{
  let f=e.target.files[0];
  let form=new FormData();
  form.append("file",f);
  form.append("upload_preset","YOUR_PRESET");

  let r=await fetch("https://api.cloudinary.com/v1_1/YOUR_CLOUD/image/upload",{
    method:"POST",
    body:form
  });

  let d=await r.json();

  chatRef.push({
    type:"image",
    text:d.secure_url,
    sender:uid,
    time:new Date().toLocaleTimeString()
  });
};

function pickFile(){ document.getElementById("file").click(); }

document.getElementById("file").onchange=async e=>{
  let f=e.target.files[0];
  let form=new FormData();
  form.append("file",f);
  form.append("upload_preset","YOUR_PRESET");

  let r=await fetch("https://api.cloudinary.com/v1_1/YOUR_CLOUD/upload",{
    method:"POST",
    body:form
  });

  let d=await r.json();

  chatRef.push({
    type:"file",
    text:d.secure_url,
    name:f.name,
    sender:uid,
    time:new Date().toLocaleTimeString()
  });
};

window.send = send;
</script>

<!-- ================= WHATSAPP PRO LAYER (ADDITION ONLY) ================= -->
<script>
(function(){

const statusRef = firebase.database().ref("status/" + roomId);

/* ONLINE / OFFLINE */
function setOnline(){
  statusRef.set({uid,state:"online",time:Date.now()});
}
function setOffline(){
  statusRef.set({uid,state:"offline",time:Date.now()});
}
setOnline();
window.addEventListener("beforeunload", setOffline);

/* SEEN */
chatRef.on("child_added",s=>{
  const msg=s.val();
  if(msg.sender!==uid){
    setTimeout(()=>s.ref.update({seen:true}),400);
  }
});

/* STATUS DOT */
statusRef.on("value",s=>{
  const v=s.val();
  const dot=document.querySelector(".statusDot");
  if(dot) dot.style.background=(v&&v.state==="online")?"lime":"gray";
});

/* TYPING */
typingRef.on("value",s=>{
  const v=s.val();
  const el=document.getElementById("typing");
  if(el) el.style.display=v?.typing?"block":"none";
});

})();
</script>

<!-- ================= BLOCKED WORDS (ADDITION ONLY) ================= -->
<script>
const blockedWords=["كلمة1","كلمة2","ممنوع","سب","شتيمة"];

(function(){
  const originalSend=window.send;
  window.send=function(){
    let input=document.getElementById("msg");
    for(let w of blockedWords){
      if(input.value.includes(w)){
        alert("❌ ممنوع إرسال هذه الكلمة");
        return;
      }
    }
    return originalSend.apply(this,arguments);
  };
})();
</script>

</body>
</html>
