<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

/* ================= CORE ================= */
body{
  margin:0;
  font-family:Arial;
  height:100vh;
  display:flex;
  flex-direction:column;
  background-size:cover;
  background-position:center;
}

body::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.45);
  z-index:-1;
}

/* HEADER */
.header{
  height:55px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 12px;
  background:#800000;
  border-bottom:2px solid #d4af37;
}

.left{display:flex;align-items:center;gap:8px;}
.left img{width:34px;height:34px;border-radius:10px;}

.title{color:#d4af37;font-weight:bold;font-size:14px;}

/* CHAT */
.chat{flex:1;overflow-y:auto;padding:10px;}

.msg{
  max-width:75%;
  margin:6px 0;
  padding:10px;
  border-radius:14px;
  font-size:14px;
  animation:pop .15s ease;
}

.me{margin-left:auto;background:#d4af37;color:#000;}
.other{background:#fff;}

/* META */
.meta{font-size:10px;opacity:0.6;display:block;margin-top:3px;}

/* INPUT */
.inputBar{display:flex;padding:8px;background:#fff;}
input{flex:1;padding:10px;border-radius:20px;border:1px solid #ddd;outline:none;}
button{margin-left:6px;padding:10px 14px;border:none;border-radius:20px;background:#800000;color:#fff;}

/* EMOJI */
#emojiBox{
  display:none;
  position:absolute;
  bottom:70px;
  left:10px;
  right:10px;
  background:#fff;
  border-radius:14px;
  padding:10px;
  font-size:22px;
  max-height:250px;
  overflow-y:auto;
}

/* TYPING */
#typing{display:none;font-size:12px;color:#d4af37;padding:4px 10px;}

/* ANIM */
@keyframes pop{
  from{opacity:0;transform:translateY(8px);}
  to{opacity:1;transform:translateY(0);}
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="left">
    <img id="logo">
    <div class="title" id="title">Chat</div>
  </div>
  <div id="status">●</div>
</div>

<!-- CHAT -->
<div class="chat" id="chat"></div>

<div id="typing">جاري الكتابة...</div>

<!-- INPUT -->
<div class="inputBar">
  <button onclick="toggleEmoji()">😊</button>
  <input id="msg">
  <button onclick="send()">إرسال</button>
</div>

<!-- EMOJI -->
<div id="emojiBox">
😂 😅 🤣 😍 😭 😊 👍 👎 👌 🙏 💯 🔥 ❤️ 😎 🤔 😴 🥳 ✨ 🎉 💥 🚀 ⚡
</div>

<script>

/* ================= FIREBASE ================= */
const roomId="room1";

firebase.initializeApp({
  apiKey:"YOUR_KEY",
  authDomain:"YOUR_DOMAIN",
  databaseURL:"YOUR_DB"
});

const chatRef=firebase.database().ref("chats/"+roomId+"/messages");
const settings=firebase.database().ref("settings/"+roomId);

/* ================= SEND ================= */
function send(){

  let input=document.getElementById("msg");
  if(!input.value.trim())return;

  chatRef.push({
    text:input.value,
    sender:"client",
    time:new Date().toLocaleTimeString(),
    seen:false,
    type:"text"
  });

  input.value="";
}

/* ================= RECEIVE ================= */
chatRef.on("child_added",s=>{

  let m=s.val();
  let div=document.createElement("div");

  div.className="msg "+(m.sender==="client"?"other":"me");

  let ticks = m.seen ? "✓✓" : "✓";

  div.innerHTML=`
    ${m.text}
    <span class="meta">${m.time} ${ticks}</span>
  `;

  document.getElementById("chat").appendChild(div);
  div.scrollIntoView({behavior:"smooth"});
});

/* ================= TYPING REAL ================= */
let typingRef=firebase.database().ref("typing/"+roomId);

document.getElementById("msg").addEventListener("input",()=>{

  typingRef.set(true);

  clearTimeout(window.t);

  window.t=setTimeout(()=>{
    typingRef.set(false);
  },800);
});

typingRef.on("value",s=>{
  document.getElementById("typing").style.display = s.val()? "block":"none";
});

/* ================= ONLINE ================= */
let statusRef=firebase.database().ref("status/"+roomId);

setInterval(()=>{
  statusRef.set(Date.now());
},5000);

statusRef.on("value",s=>{
  document.getElementById("status").innerText="🟢 Live";
});

/* ================= EMOJI ================= */
function toggleEmoji(){
  let b=document.getElementById("emojiBox");
  b.style.display=b.style.display==="block"?"none":"block";
}

document.getElementById("emojiBox").onclick=e=>{
  if(e.target.innerText){
    document.getElementById("msg").value+=e.target.innerText;
    document.getElementById("emojiBox").style.display="none";
  }
};

/* ================= SETTINGS ================= */
settings.child("logoUrl").on("value",s=>{
  if(s.val())document.getElementById("logo").src=s.val();
});

settings.child("title").on("value",s=>{
  if(s.val())document.getElementById("title").innerText=s.val();
});

settings.child("backgroundUrl").on("value",s=>{
  if(s.val())document.body.style.backgroundImage="url("+s.val()+")";
});

</script>

</body>
</html>
