<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
/* التعديل الجوهري لضبط العرض */
* { box-sizing: border-box; }

/* ================= CORE THEME ================= */
:root{
  --maroon:#800000;
  --gold:#d4af37;
  --dark:#1c1c1c;
  --white:#ffffff;
}

body{
  margin:0;
  font-family:Arial;
  height:100vh;
  display:flex;
  flex-direction:column;
  background:var(--dark);
  background-size:cover;
  overflow-x: hidden; 
}

/* ================= HEADER (تم نقل الترس هنا) ================= */
.header{
  height:55px;
  background:var(--maroon);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 10px;
  border-bottom:2px solid var(--gold);
  color:var(--gold);
  width: 100%;
}

.statusDot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:lime;
}

/* ================= CHAT ================= */
.chat{
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  width: 100%;
}

.msg{
  max-width:75%;
  padding:10px;
  margin:6px 0;
  border-radius:12px;
  font-size:14px;
  word-break:break-word;
}

.me{
  align-self:flex-end;
  background:var(--gold);
  color:black;
}

.other{
  align-self:flex-start;
  background:white;
}

.meta{
  font-size:10px;
  opacity:0.6;
  margin-top:4px;
}

/* ================= INPUT (تم دمج الأزرار) ================= */
.inputBar{
  display:flex;
  padding:6px;
  background:#111;
  align-items:center;
  width: 100%;
  gap: 5px;
}

input{
  flex:1;
  min-width: 0;
  padding:10px;
  border:none;
  border-radius:20px;
  outline:none;
}

button{
  padding:10px 12px;
  border:none;
  border-radius:20px;
  background:var(--maroon);
  color:white;
  flex-shrink: 0;
}

.attachGroup { display:none; gap:5px; }

/* ================= EMOJI BOX ================= */
#emojiBox{
  display:none;
  position:absolute;
  bottom:70px;
  left:10px;
  right:10px;
  background:white;
  border-radius:12px;
  padding:10px;
  max-height:220px;
  overflow:auto;
  z-index:999;
  font-size:22px;
  display: none;
  grid-template-columns: repeat(auto-fill, minmax(30px, 1fr));
}

/* ================= SETTINGS ================= */
#settings{
  display:none;
  position:fixed;
  top:60px;
  left:10px;
  background:white;
  padding:10px;
  border-radius:10px;
  z-index:9999;
}
</style>
</head>

<body>

<div class="header">
  <button onclick="toggleSettings()" style="background:none; border:none; color:var(--gold); font-size:20px;">⚙️</button>
  <div id="title">اسم العميل</div>
  <div class="statusDot"></div>
</div>

<div class="chat" id="chat"></div>
<div id="typing" style="display:none;color:gold;padding:5px;">جاري الكتابة...</div>

<div class="inputBar">
  <button onclick="toggleEmoji()">😊</button>
  <button onclick="toggleAttach()">📎</button>
  <div class="attachGroup" id="attachGroup">
      <button onclick="pickImage()">📷</button>
      <button onclick="pickFile()">📁</button>
  </div>
  <input id="msg" placeholder="اكتب...">
  <button onclick="send()">إرسال</button>
  <input type="file" id="img" hidden accept="image/*">
  <input type="file" id="file" hidden>
</div>

<div id="emojiBox"></div>

<div id="settings">
  <b>Background</b><br>
  <button onclick="setBg('https://images.unsplash.com/photo-1507525428034-b723cf961d3e')">Sea</button>
  <button onclick="setBg('https://images.unsplash.com/photo-1519681393784-d120267933ba')">Night</button>
  <button onclick="setBg('')">Clear</button>
  <br><br>
  <b>Theme</b><br>
  <button onclick="theme('maroon')">Maroon</button>
  <button onclick="theme('dark')">Dark</button>
  <button onclick="theme('gold')">Gold</button>
</div>

<script>
// إعدادات كلاودينري - ضع بياناتك هنا
const CLOUD_NAME = "YOUR_CLOUD_NAME"; 
const UPLOAD_PRESET = "YOUR_UPLOAD_PRESET";

firebase.initializeApp({
  apiKey: "AIzaSyDxefz9m4Y4V0HfIu4UwWAKSqYb1AusZIE",
  databaseURL: "https://aklet-c0642-default-rtdb.firebaseio.com"
});

const roomId="room1";
const chatRef=firebase.database().ref("chat/"+roomId);
const typingRef=firebase.database().ref("typing/"+roomId);
const uid = localStorage.getItem("uid") || crypto.randomUUID();
localStorage.setItem("uid", uid);

let isInitialLoad = true;

// كود رفع الصور على Cloudinary
document.getElementById("img").addEventListener("change", async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", UPLOAD_PRESET);

    try {
        const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
            method: "POST",
            body: formData
        });
        const data = await response.json();
        
        chatRef.push({
            text: data.secure_url,
            type: "image",
            sender: uid,
            time: new Date().toLocaleTimeString()
        });
    } catch (err) {
        console.error("خطأ في رفع الصورة", err);
    }
});

const emojis = ["&#128514;","&#128517;","&#129315;","&#128525;","&#128522;","&#128557;","&#128526;","&#128077;","&#128076;","&#128591;","&#128175;","&#128293;","&#10084;","&#128640;","&#9889;","&#127873;","&#127918;","&#128241;","&#129504;","&#128176;","&#127942;","&#10024;","&#128545;","&#128561;","&#128564;","&#129300;","&#128519;","&#128536;","&#128540;","&#128523;","&#128548;","&#128520;","&#128123;","&#128169;","&#129395;","&#128165;","&#127775;","&#127919;","&#129351;","&#129352;","&#129353;","&#127874;"];
const emojiBox = document.getElementById("emojiBox");
emojis.forEach(emo => {
    let span = document.createElement("span");
    span.innerHTML = emo;
    span.style.cursor = "pointer";
    span.onclick = () => {
        document.getElementById("msg").value += span.innerText;
        document.getElementById("emojiBox").style.display = "none";
    };
    emojiBox.appendChild(span);
});

function send(){
  let input=document.getElementById("msg");
  if(!input.value.trim()) return;
  chatRef.push({
    text:input.value,
    type:"text",
    sender:uid,
    time:new Date().toLocaleTimeString()
  });
  input.value="";
}

chatRef.on("child_added",s=>{
  let m=s.val();
  let div=document.createElement("div");
  div.className="msg "+(m.sender===uid?"me":"other");
  if(m.type==="image"){
    div.innerHTML=`<img src="${m.text}" style="width:100%;border-radius:10px;"><div class="meta">${m.time}</div>`;
  }
  else if(m.type==="file"){
    div.innerHTML=`📎 <a href="${m.text}" target="_blank">ملف</a><div class="meta">${m.time}</div>`;
  }
  else{
    div.innerHTML=`${m.text}<div class="meta">${m.time}</div>`;
  }
  document.getElementById("chat").appendChild(div);
  
  if(!isInitialLoad) {
      div.scrollIntoView({behavior:"smooth"});
  } else {
      document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
  }
});

chatRef.once("value", () => {
    isInitialLoad = false;
    document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
});

document.getElementById("msg").addEventListener("input",()=>{
  typingRef.set({user:uid,typing:true});
  clearTimeout(window.t);
  window.t=setTimeout(()=>{
    typingRef.set({user:uid,typing:false});
  },800);
});

typingRef.on("value",s=>{
  let v=s.val();
  if(v && v.typing && v.user !== uid) {
      document.getElementById("typing").style.display = "block";
  } else {
      document.getElementById("typing").style.display = "none";
  }
});

function toggleEmoji(){
  let e=document.getElementById("emojiBox");
  e.style.display = (e.style.display === "grid") ? "none" : "grid";
}

function toggleAttach(){
  let a=document.getElementById("attachGroup");
  a.style.display = a.style.display==="flex"?"none":"flex";
}

function toggleSettings(){
  let s=document.getElementById("settings");
  s.style.display=s.style.display==="block"?"none":"block";
}

function setBg(url){
  document.body.style.backgroundImage = url ? `url(${url})` : "none";
}

function theme(t){
  if(t==="maroon"){
    document.documentElement.style.setProperty('--maroon','#800000');
    document.documentElement.style.setProperty('--gold','#d4af37');
  }
  if(t==="dark"){
    document.documentElement.style.setProperty('--maroon','#222');
    document.documentElement.style.setProperty('--gold','#999');
  }
  if(t==="gold"){
    document.documentElement.style.setProperty('--maroon','#3b2f00');
    document.documentElement.style.setProperty('--gold','#ffd700');
  }
}

function pickImage(){ document.getElementById("img").click(); }
function pickFile(){ document.getElementById("file").click(); }
</script>
</body>
</html>
